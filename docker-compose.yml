services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist SQLite / runtime data without hiding the shipped playbook files.
      - backend-data:/app/db
    # Ensure the backend uses the root .env (via env_file) and data persists.

  frontend:
    image: nginx:1.25-alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  backend-data:
    name: soc-netcomp-backend-data
