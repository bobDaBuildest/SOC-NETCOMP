name: CI — AI SOC Dashboard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    name: Run Tests and Lint

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Force-install gns3fy separately, ignoring its Pydantic v1 requirement
          pip install "gns3fy==1.0.0rc3" --pre --no-deps
          
          # Install the main application requirements cleanly
          pip install -r backend/requirements.txt
          
          pip install flake8 pytest

      - name: 🔍 Run flake8 (Lint)
        run: |
          # Use the correct relative path
          flake8 backend/ --max-line-length=120 --ignore=E501,W503,F401,F841,W293

      - name: ✅ Run tests with pytest
        run: |
          # Use the correct relative path for PYTHONPATH and pytest
          export PYTHONPATH=$PYTHONPATH:$(pwd)/backend
          pytest tests/ -v --tb=short

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          # Use the correct relative path
          path: tests/
