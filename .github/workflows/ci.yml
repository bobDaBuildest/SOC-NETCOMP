name: CI — AI SOC Dashboard

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    name: Run Tests and Lint

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install "pytest-asyncio==0.23.0" httpx flake8
          echo "--- Verify pytest-asyncio installed ---"
          pip show pytest-asyncio

      - name: 🔍 Run flake8 (Lint)
        run: |
          flake8 backend/ --max-line-length=120 \
            --ignore=E501,W503,F401,F841,W293,E302,E303,E305,E402,E221,E241,E226,E127,E126,E401,W291,W292,F541,E741
        continue-on-error: true

      - name: ✅ Run tests with pytest
        run: |
          export PYTHONPATH=$(pwd)/backend
          python -m pytest tests/ -v --tb=short --asyncio-mode=auto -p no:cacheprovider

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/